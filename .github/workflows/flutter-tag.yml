name: Flutter Tag Build

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'FerryDesk product variant (cargo feature flag)'
        required: false
        default: 'paid-operator'
        type: choice
        options:
          - paid-operator
          - free-standalone
          - paid-host
  push:
     tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - 'ferrydesk-v[0-9]+.[0-9]+.[0-9]+'
      - 'ferrydesk-v[0-9]+.[0-9]+.[0-9]+-[a-z0-9]+'

jobs:
  run-flutter-tag-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: ${{ github.ref_name }}
      variant: ${{ inputs.variant || 'paid-operator' }}
